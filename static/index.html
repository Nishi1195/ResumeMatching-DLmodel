<!DOCTYPE html>
<html>
<head>
<title>Resume Matcher</title>
</head>

<body>

<h2>Resume Job Matcher</h2>

<textarea id="resume" placeholder="Paste Resume"></textarea>

<br><br>

<textarea id="jd" placeholder="Paste Job Description"></textarea>

<br><br>

<button onclick="predict()">Check Match</button>

<h3 id="result"></h3>

<script>

async function predict(){

let resume=document.getElementById("resume").value
let jd=document.getElementById("jd").value

let response=await fetch("/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
resume:resume,
job_description:jd
})
})

let data=await response.json()

document.getElementById("result").innerText =
"Match Probability: "+data.match_probability.toFixed(3)+
" | Verdict: "+data.verdict

}

</script>

</body>
</html>
